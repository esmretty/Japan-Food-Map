name: Tabelog Scraper

on:
  workflow_dispatch: # 允許在 GitHub 網頁上手動點擊執行
  schedule:
    - cron: '0 0 * * 0' # 每週日凌晨執行一次 (可選)

permissions:
  contents: write # 允許 Action 寫入並 Push 程式碼

jobs:
  scrape:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        part: [1, 2, 3, 4]
      fail-fast: false # 讓其他 part 即使有某個 part 失敗也能繼續跑
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # 確保 git pull --rebase 正常運作

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install && npm install cheerio

      - name: Run Scraper Part ${{ matrix.part }}
        run: node scripts/scraper.mjs ${{ matrix.part }}
